name: Engine Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  engine:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          choco install vulkan-sdk --no-progress --limit-output -y
          $sdk = Get-ChildItem C:\VulkanSDK -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if ($null -eq $sdk) { throw "Vulkan SDK installation did not create C:\VulkanSDK" }
          "VULKAN_SDK=$($sdk.FullName)" >> $env:GITHUB_ENV
          "$($sdk.FullName)\Bin" >> $env:GITHUB_PATH

      - name: Configure engine tests and dependency audit
        shell: pwsh
        run: cmake -S snt_engine -B build-engine-tests -DSNT_BUILD_TESTS=ON

      - name: Build isolated engine targets
        shell: pwsh
        run: >-
          cmake --build build-engine-tests --config Debug --target
          snt_core snt_ecs snt_render_backend snt_voxel_mesh snt_voxel
          snt_gameplay snt_engine --parallel 2

      - name: Build and run engine tests
        shell: pwsh
        run: |
          cmake --build build-engine-tests --config Debug --target snt_tests --parallel 2
          ctest --test-dir build-engine-tests -C Debug --output-on-failure

      - name: Configure game host and dependency audit
        shell: pwsh
        run: cmake -S . -B build-game -DSNT_BUILD_TESTS=OFF

      - name: Build game host
        shell: pwsh
        run: cmake --build build-game --config Debug --target snt_game_client --parallel 2
