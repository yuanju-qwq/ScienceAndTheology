name: Build, Test & Export

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  GODOT_VERSION: 4.7-stable

jobs:
  cpp:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
        working-directory: src

      - name: Build
        run: cmake --build build --config Release
        working-directory: src

      - name: Test
        run: ctest --test-dir build -R "^snt\." -C Release --output-on-failure
        working-directory: src

  export:
    if: startsWith(github.ref, 'refs/tags/')
    needs: cpp
    strategy:
      matrix:
        include:
          - os: windows-latest
            preset: "Windows Desktop"
            artifact: ScienceAndTheology-Windows.zip
            godot_exe: Godot_v4.7-stable_win64.exe
          - os: ubuntu-latest
            preset: "Linux Desktop"
            artifact: ScienceAndTheology-Linux.zip
            godot_exe: Godot_v4.7-stable_linux.x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build GDExtension (C++)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
        working-directory: src

      - name: Download Godot Editor
        shell: pwsh
        run: |
          $v = "$env:GODOT_VERSION"
          $url = "https://github.com/godotengine/godot/releases/download/$v/Godot_v${v}_win64.exe.zip"
          if ("${{ runner.os }}" -ne "Windows") { $url = "https://github.com/godotengine/godot/releases/download/$v/Godot_v${v}_linux.x86_64.zip" }
          Invoke-WebRequest -Uri $url -OutFile godot.zip
          Expand-Archive -Path godot.zip -DestinationPath godot -Force
          $exePath = Join-Path (Get-Location) "godot" "${{ matrix.godot_exe }}"
          echo "GODOT_EXE=$exePath" >> $env:GITHUB_ENV

      - name: Download & Install Export Templates
        shell: pwsh
        run: |
          $v = "$env:GODOT_VERSION"
          $url = "https://github.com/godotengine/godot/releases/download/$v/Godot_v${v}_export_templates.tpz"
          Invoke-WebRequest -Uri $url -OutFile templates.tpz

          $versionDir = $v.Replace('-stable', '')
          if ("${{ runner.os }}" -eq "Windows") {
            $templatesDir = "$env:APPDATA\Godot\export_templates\$versionDir"
          } else {
            $templatesDir = "$HOME/.godot/export_templates/$versionDir"
          }
          New-Item -ItemType Directory -Path $templatesDir -Force | Out-Null

          $oldLocation = Get-Location
          Set-Location -Path $templatesDir
          Expand-Archive -Path "$oldLocation/templates.tpz" -DestinationPath . -Force
          Set-Location -Path $oldLocation

      - name: Export Game
        shell: pwsh
        run: |
          & "$env:GODOT_EXE" --path . --headless --export-release "${{ matrix.preset }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: builds/
